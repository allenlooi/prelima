<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Prelima dev preview (no-build)</title>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.462.0?external=react",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.47.10",
    "docx": "https://esm.sh/docx@9.1.1"
  }
}
</script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root">Loading…</div>
<script>
// This file is a Node-free way to eyeball changes to src/App.jsx. It is NOT
// what gets deployed — Vercel builds index.html + src/main.jsx via Vite instead.
// /api/claude won't exist under this static server, so AI calls fall back to
// the app's built-in offline fallback text (by design, see callClaude callers).
window.addEventListener("error", (e) => {
  document.getElementById("root").innerText = "ERROR: " + e.message;
});
window.addEventListener("unhandledrejection", (e) => {
  document.getElementById("root").innerText = "UNHANDLED REJECTION: " + (e.reason && e.reason.message || e.reason);
});

(async () => {
  const res = await fetch("./src/App.jsx");
  if (!res.ok) throw new Error("Could not fetch src/App.jsx (HTTP " + res.status + ")");
  // Relative AND root-relative imports (./supabaseClient.js, ./db.js) fail to resolve
  // against a blob: URL (it isn't hierarchical) — needs a fully-qualified URL instead.
  const src = (await res.text()).replace(/from "\.\//g, 'from "' + location.origin + '/src/');
  const { code } = Babel.transform(src, { presets: ["react"], sourceType: "module", filename: "app.jsx" });
  const blob = new Blob([code], { type: "text/javascript" });
  const url = URL.createObjectURL(blob);
  const mod = await import(url);
  const { createRoot } = await import("react-dom/client");
  const React = (await import("react")).default;
  createRoot(document.getElementById("root")).render(React.createElement(mod.default));
})().catch(err => {
  document.getElementById("root").innerText = "LOAD ERROR: " + err.message;
  console.error(err);
});
</script>
</body>
</html>
